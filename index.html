<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TMC Portal</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }
    
    /* The Bridge Iframe */
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }

    /* PWA Overlay & Banners */
    #pwaOverlay { z-index: 9999; background: #008136; }
    #installBanner { z-index: 10000; border: 2px solid #00C853; }
    
    .instruction-card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 15px;
      margin: 10px 0;
      width: 100%;
      font-size: 0.85rem;
      color: white;
    }

    /* Splash Screen Styling */
#splash-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: #ffffff; /* White Background */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 99999; /* Sits on top of everything */
  transition: opacity 0.5s ease-out;
}

.splash-logo {
  width: 120px; /* Smaller logo size */
  margin-bottom: 25px;
}

/* The Rolling Circle (Spinner) */
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #f3f3f3;
  border-top: 3px solid #008136; /* TMC Green */
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
  </style>
</head>
<body>

  <iframe src="https://script.google.com/macros/s/AKfycbwhY0VGxodcDgYLBqEiWUtlqEO8-SkebA9VvkRh_bIjtbNDO3WLbZod40A8KSQVOuBa/exec"></iframe>

  <div id="pwaOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px;">
    <div style="font-size: 4rem; margin-bottom: 20px;">📲</div>
    <h2 class="fw-bold text-white">TMC PORTAL</h2>
    <p class="mb-4 text-white">To ensure secure access, please install the official portal to your home screen.</p>
    
    <div class="instruction-card">
      <strong>iPhone:</strong> Tap <span class="badge bg-light text-dark">Share</span> then "Add to Home Screen"
    </div>
    <div class="instruction-card">
      <strong>Android:</strong> Tap <span class="badge bg-light text-dark">⋮</span> then "Install App"
    </div>
  </div>

  <div id="installBanner" style="display:none; position:fixed; bottom:20px; left:20px; right:20px; background:white; padding:20px; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
    <div class="d-flex align-items-center gap-3">
      <img src="https://drive.google.com/thumbnail?id=1eBPVAmgM5m8PI0m-vOz4A5Msftlnx-7F&sz=s100" style="width:50px; border-radius:12px;">
      <div style="flex-grow:1;">
        <h6 class="fw-bold mb-0" style="color:#333;">TMC Portal</h6>
        <small class="text-muted">Install for a better experience</small>
      </div>
      <button id="installBtn" onclick="handleInstallClick()" class="btn btn-success btn-sm fw-bold" style="border-radius:10px; padding:8px 15px;">INSTALL</button>
    </div>
  </div>

  <script>
    let deferredPrompt;

    // --- 1. REGISTER SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }

    // --- 2. DETECT IF ALREADY INSTALLED ---
    function checkPWAStatus() {
      const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      const overlay = document.getElementById('pwaOverlay');
      // Only show overlay if NOT in PWA mode
      if (overlay) overlay.style.display = isPWA ? 'none' : 'flex';
    }
    window.addEventListener('load', checkPWAStatus);

    // --- 3. ANDROID INSTALL LOGIC ---
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show the small bottom banner if we have the prompt
      document.getElementById('installBanner').style.display = 'block';
    });

    async function handleInstallClick() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        document.getElementById('installBanner').style.display = 'none';
      }
      deferredPrompt = null;
    }
  </script>
</body>
</html>
